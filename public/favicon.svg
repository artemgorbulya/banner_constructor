<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: deep purple rounded square -->
  <rect width="32" height="32" rx="7" fill="#4c1d95"/>

  <!-- Banner canvas (wide, landscape orientation) -->
  <rect x="3" y="10" width="26" height="12" rx="2.5" fill="#6d28d9"/>

  <!-- Left: image/color block -->
  <rect x="3" y="10" width="11" height="12" rx="2.5" fill="#8b5cf6"/>
  <!-- Sun/circle accent in image block -->
  <circle cx="8.5" cy="14" r="2" fill="#c4b5fd" opacity="0.9"/>
  <!-- Horizon line in image block -->
  <path d="M3 19.5 Q6.5 17 11 19.5" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Right: text placeholder lines -->
  <rect x="16" y="12.5" width="10" height="2.5" rx="1.25" fill="white"/>
  <rect x="16" y="17" width="7" height="2" rx="1" fill="white" opacity="0.65"/>

  <!-- Bottom accent bar -->
  <rect x="3" y="22" width="26" height="2" rx="1" fill="#7c3aed" opacity="0.5"/>
</svg>
